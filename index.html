<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Tournoi Volley 4x4 - CASSON - 22 MAI 2027</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <!-- QR Code -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f7fb;
    }
    header {
      background: #1e88e5;
      color: white;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header button {
      background: white;
      color: #1e88e5;
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }
    header button:hover {
      background: #e3f2fd;
    }
    button.danger {
      background: #ffebee;
      color: #c62828;
    }
    main {
      padding: 20px;
      max-width: 1200px;
      margin: auto;
    }
    section {
      background: white;
      padding: 16px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 6px;
    }
    th {
      background: #f1f5fb;
    }
    .hidden {
      display: none !important;
    }
    #qrcode {
      margin-top: 20px;
      background: white;
      padding: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>
<header>
  <h1>Tournoi Volley 4x4 - Casson</h1>
  <div>
    <button onclick="openResults()">Résultats & Classement</button>
    <button onclick="openLive()">Matchs en cours</button>
    <button class="danger" onclick="resetTournament()">Réinitialiser</button>
  </div>
</header>

<main>

  <!-- CONFIG -->
  <section id="configSection">
    <h2>Configuration</h2>
    <label>Nombre d'équipes</label>
    <input type="number" id="nbTeams" value="8" min="2">

    <label>Nombre de terrains</label>
    <input type="number" id="nbCourts" value="3" min="1">

    <button onclick="generateSchedule()">Générer le planning</button>
  </section>

  <!-- TEAMS -->
  <section id="teamsSection">
    <h2>Équipes</h2>

    <input type="text" id="newTeamName" placeholder="Nom de l'équipe">
    <button onclick="addTeam()">Ajouter</button>

    <textarea id="pasteArea" placeholder="Colle ici une colonne Excel"></textarea>
    <button onclick="importPastedTeams()">Importer</button>

    <table id="teamsTable">
      <thead>
        <tr><th>#</th><th>Nom</th><th>Points</th><th>Victoires</th><th>Défaites</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

  <!-- SCHEDULE -->
  <section id="scheduleSection">
    <h2>Planning</h2>
    <table id="scheduleTable">
      <thead>
        <tr>
          <th>Ronde</th><th>Heure</th><th>Terrain</th>
          <th>Équipe A</th><th>Équipe B</th>
          <th>Score A</th><th>Score B</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

  <!-- RESULTS -->
  <section id="resultsSection">
    <h2>Classement</h2>
    <table id="rankingTable">
      <thead>
        <tr><th>Rang</th><th>Équipe</th><th>Points</th><th>Victoires</th><th>Défaites</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

  <!-- LIVE -->
  <section id="liveSection" class="hidden">
    <h2>Matchs en cours</h2>
    <div id="liveMatch"></div>
    <div id="qrcode"></div>
  </section>

</main>

<script>
/* -----------------------------
   FIREBASE CONFIG
----------------------------- */
const firebaseConfig = {
  apiKey: "AIzaSyC0jCmtlxUZPNquETfFTZK09q4-sAz9NHE",
  authDomain: "tournoi-volley-casson-2027.firebaseapp.com",
  databaseURL: "https://tournoi-volley-casson-2027-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "tournoi-volley-casson-2027",
  storageBucket: "tournoi-volley-casson-2027.firebasestorage.app",
  messagingSenderId: "1006967763633",
  appId: "1:1006967763633:web:6725f4aefadf81c81fa890",
  measurementId: "G-3WR91F9B6F"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const TEAMS = "teams";
const MATCHES = "matches";

let teams = [];
let matches = [];

/* -----------------------------
   LOAD FROM FIREBASE
----------------------------- */
async function loadData() {
  const tSnap = await db.collection(TEAMS).get();
  teams = tSnap.docs.map(d => d.data());

  const mSnap = await db.collection(MATCHES).get();
  matches = mSnap.docs.map(d => d.data());

  renderTeams();
  renderSchedule();
  renderRanking();
}

/* -----------------------------
   ADD TEAM
----------------------------- */
function addTeam() {
  const name = newTeamName.value.trim();
  if (!name) return;

  const team = {
    id: crypto.randomUUID(),
    name,
    points: 0,
    wins: 0,
    losses: 0
  };

  teams.push(team);
  db.collection(TEAMS).doc(team.id).set(team);

  newTeamName.value = "";
  renderTeams();
}

function importPastedTeams() {
  const lines = pasteArea.value.split("\n");
  lines.forEach(l => {
    const name = l.trim();
    if (!name) return;

    const team = {
      id: crypto.randomUUID(),
      name,
      points: 0,
      wins: 0,
      losses: 0
    };

    teams.push(team);
    db.collection(TEAMS).doc(team.id).set(team);
  });

  pasteArea.value = "";
  renderTeams();
}

/* -----------------------------
   RENDER TEAMS
----------------------------- */
function renderTeams() {
  const tbody = teamsTable.querySelector("tbody");
  tbody.innerHTML = "";

  teams.sort((a,b)=>b.points-a.points).forEach((t,i)=>{
    tbody.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td>${t.name}</td>
        <td>${t.points}</td>
        <td>${t.wins}</td>
        <td>${t.losses}</td>
      </tr>`;
  });

  renderRanking();
}

/* -----------------------------
   GENERATE SCHEDULE (SWISS)
----------------------------- */
function generateSchedule() {
  const courts = parseInt(nbCourts.value);
  const start = 10*60+30;
  const end = 18*60;
  const slot = 20; // 15 + 5 rotation

  let time = start;
  let round = 1;

  matches = [];

  while (time + 15 <= end) {
    const sorted = [...teams].sort((a,b)=>b.points-a.points);
    const used = new Set();

    for (let c=1; c<=courts; c++) {
      const tA = sorted.find(t => !used.has(t.id));
      if (!tA) break;
      used.add(tA.id);

      const tB = sorted.find(t => !used.has(t.id));
      if (!tB) break;
      used.add(tB.id);

      const match = {
        id: crypto.randomUUID(),
        round,
        time: minutesToTime(time),
        court: c,
        teamAId: tA.id,
        teamBId: tB.id,
        scoreA: null,
        scoreB: null
      };

      matches.push(match);
      db.collection(MATCHES).doc(match.id).set(match);
    }

    time += slot;
    round++;
  }

  renderSchedule();
}

/* -----------------------------
   RENDER SCHEDULE
----------------------------- */
function renderSchedule() {
  const tbody = scheduleTable.querySelector("tbody");
  tbody.innerHTML = "";

  matches.forEach(m => {
    const A = teams.find(t=>t.id===m.teamAId)?.name || "?";
    const B = teams.find(t=>t.id===m.teamBId)?.name || "?";

    tbody.innerHTML += `
      <tr>
        <td>${m.round}</td>
        <td>${m.time}</td>
        <td>${m.court}</td>
        <td>${A}</td>
        <td>${B}</td>
        <td contenteditable="true" oninput="updateScore('${m.id}','A',this.innerText)">${m.scoreA ?? ""}</td>
        <td contenteditable="true" oninput="updateScore('${m.id}','B',this.innerText)">${m.scoreB ?? ""}</td>
      </tr>`;
  });
}

/* -----------------------------
   UPDATE SCORE
----------------------------- */
function updateScore(id, side, val) {
  const match = matches.find(m=>m.id===id);
  if (!match) return;

  const score = val.trim()==="" ? null : parseInt(val);
  if (side==="A") match.scoreA = score;
  else match.scoreB = score;

  db.collection(MATCHES).doc(id).update(match);

  recalcPoints();
}

/* -----------------------------
   RECALC POINTS
----------------------------- */
function recalcPoints() {
  teams.forEach(t => {
    t.points = 0;
    t.wins = 0;
    t.losses = 0;
  });

  matches.forEach(m => {
    if (m.scoreA==null || m.scoreB==null) return;

    const A = teams.find(t=>t.id===m.teamAId);
    const B = teams.find(t=>t.id===m.teamBId);

    if (m.scoreA > m.scoreB) {
      A.points += 2; A.wins++;
      B.losses++;
    } else if (m.scoreB > m.scoreA) {
      B.points += 2; B.wins++;
      A.losses++;
    } else {
      A.points++; B.points++;
    }
  });

  teams.forEach(t => {
    db.collection(TEAMS).doc(t.id).update(t);
  });

  renderTeams();
}

/* -----------------------------
   RANKING
----------------------------- */
function renderRanking() {
  const tbody = rankingTable.querySelector("tbody");
  tbody.innerHTML = "";

  const sorted = [...teams].sort((a,b)=>b.points-a.points);

  sorted.forEach((t,i)=>{
    tbody.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td>${t.name}</td>
        <td>${t.points}</td>
        <td>${t.wins}</td>
        <td>${t.losses}</td>
      </tr>`;
  });
}

/* -----------------------------
   LIVE VIEW
----------------------------- */
function openLive() {
  window.open(location.pathname + "?view=live", "_blank");
}

function openResults() {
  window.open(location.pathname + "?view=results", "_blank");
}

function applyView() {
  const view = new URLSearchParams(location.search).get("view");

  if (view==="live") {
    configSection.classList.add("hidden");
    teamsSection.classList.add("hidden");
    scheduleSection.classList.add("hidden");
    resultsSection.classList.add("hidden");
    liveSection.classList.remove("hidden");

    generateQRCode();
    startLiveRotation();
  }

  if (view==="results") {
    configSection.classList.add("hidden");
    teamsSection.classList.add("hidden");
    scheduleSection.classList.add("hidden");
    liveSection.classList.add("hidden");
    resultsSection.classList.remove("hidden");
  }
}

function generateQRCode() {
  new QRCode(document.getElementById("qrcode"), {
    text: location.origin + location.pathname + "?view=live",
    width: 160,
    height: 160,
    colorDark: "#1e88e5",
    colorLight: "#ffffff"
  });
}

function startLiveRotation() {
  setInterval(()=>{
    const now = new Date();
    const hh = String(now.getHours()).padStart(2,"0");
    const mm = String(now.getMinutes()).padStart(2,"0");
    const time = hh+":"+mm;

    const current = matches.filter(m=>m.time===time);
    if (current.length===0) {
      liveMatch.innerHTML = "Aucun match en cours";
      return;
    }

    const m = current[0];
    const A = teams.find(t=>t.id===m.teamAId)?.name;
    const B = teams.find(t=>t.id===m.teamBId)?.name;

    liveMatch.innerHTML = `
      <h3>Terrain ${m.court}</h3>
      <p>${A} vs ${B}</p>
    `;
  }, 5000);
}

/* -----------------------------
   RESET
----------------------------- */
async function resetTournament() {
  if (!confirm("Supprimer toutes les données ?")) return;

  const tSnap = await db.collection(TEAMS).get();
  const batch1 = db.batch();
  tSnap.forEach(doc => batch1.delete(doc.ref));
  await batch1.commit();

  const mSnap = await db.collection(MATCHES).get();
  const batch2 = db.batch();
  mSnap.forEach(doc => batch2.delete(doc.ref));
  await batch2.commit();

  teams = [];
  matches = [];

  renderTeams();
  renderSchedule();
  renderRanking();

  alert("Tournoi réinitialisé.");
}

/* -----------------------------
   UTILS
----------------------------- */
function minutesToTime(m) {
  const h = Math.floor(m/60);
  const mm = m%60;
  return String(h).padStart(2,"0")+":"+String(mm).padStart(2,"0");
}

/* -----------------------------
   INIT
----------------------------- */
loadData().then(applyView);
</script>

</body>
</html>
